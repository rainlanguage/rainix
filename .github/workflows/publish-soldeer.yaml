name: Publish to Soldeer
on:
  workflow_call:
    inputs:
      package_name:
        type: string
        required: false
        description: |
          Soldeer registry package name. Defaults to the GitHub repo name
          with `.` replaced by `-` (e.g. rain.solmem -> rain-solmem),
          which works for every rain.* repo. Override only if the
          registry name diverges from the repo name.
    secrets:
      SOLDEER_API_TOKEN:
        required: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      # Substitute prebuilt rainix derivations from the shared Cachix binary
      # cache instead of rebuilding toolchain crates from source (rainix#196).
      # Pushes new paths when CACHIX_AUTH_TOKEN is set; continue-on-error so a
      # missing cache/token or a Cachix outage degrades to a normal build.
      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # No store-watching daemon: it checkpoints the nix DB
          # concurrently with cache-nix-action and corrupts it ("database
          # disk image is malformed"). Push happens once in the post step.
          useDaemon: false
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
      - name: Push to Soldeer
        env:
          SOLDEER_API_TOKEN: ${{ secrets.SOLDEER_API_TOKEN }}
          INPUT_PACKAGE_NAME: ${{ inputs.package_name }}
        run: |
          if [ -n "$INPUT_PACKAGE_NAME" ]; then
            PACKAGE="$INPUT_PACKAGE_NAME"
          else
            PACKAGE="${GITHUB_REPOSITORY##*/}"
            PACKAGE="${PACKAGE//./-}"
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          nix develop github:rainlanguage/rainix#sol-shell -c forge soldeer push "${PACKAGE}~${VERSION}"
