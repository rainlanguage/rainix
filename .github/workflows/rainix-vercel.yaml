##
## Reusable Vercel deploy for rainlanguage webapp repos.
##
## The caller owns the build via a fixed-path build script (default
## `./script/vercel-build.sh`) that emits the Vercel *prebuilt* output; this
## workflow owns the generic wrapper: checkout, nix, the nix-store / cargo / npm
## caches, and the Vercel pull + deploy. Drives both preview and production via
## the `environment` / `production` inputs.
##
## SECURITY MODEL (preserve when editing):
##  - Secrets are referenced only by the Vercel CLI steps, never by the build
##    step (the build runs caller-branch content; it gets only the public
##    WalletConnect id).
##  - The Vercel CLI is installed locally and invoked via an absolute path in
##    $VERCEL_BIN to avoid PATH hijacking; those steps run with a hardened shell.
##  - Inputs come from the trusted caller workflow, never from PR content.
## Fork/PR-target preview deploys belong in a separate, isolated workflow.
##
name: rainix-vercel
on:
  workflow_call:
    inputs:
      environment:
        description: Vercel environment to pull and deploy (preview | production).
        required: true
        type: string
      production:
        description: Deploy as a production deployment (adds --prod).
        required: false
        default: false
        type: boolean
      build-script:
        description: Caller-repo build script that emits the Vercel prebuilt output.
        required: false
        default: ./script/vercel-build.sh
        type: string
      deploy-path:
        description: Directory passed to `vercel deploy --prebuilt`.
        required: false
        default: packages/webapp
        type: string
      vercel-version:
        description: vercel CLI version, installed locally and invoked by absolute path.
        required: false
        default: 51.8.0
        type: string
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true
      WALLETCONNECT_PROJECT_ID:
        required: false
      CACHIX_AUTH_TOKEN:
        required: false
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    # `pull-requests: write` is needed for the sticky preview-URL comment on PRs.
    # As a reusable workflow this declares the permission it uses; callers must
    # also grant `pull-requests: write` to the job that calls this reusable
    # (a called workflow can only narrow, never widen, the caller's grant).
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      - uses: nixbuild/nix-quick-install-action@5bb6a3b3abe66fd09bbf250dce8ada94f856a703 # v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: rust-${{ github.workflow }}
      - name: Cache npm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ github.workflow }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - name: Build Vercel prebuilt output
        run: ${{ inputs.build-script }}
        env:
          PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}
      - name: Install Vercel CLI (local, pinned)
        shell: bash --noprofile --norc -euo pipefail {0}
        run: |
          VERCEL_DIR="$(mktemp -d)"
          npm install --no-audit --no-fund --no-save --prefix "$VERCEL_DIR" "vercel@${{ inputs.vercel-version }}"
          echo "VERCEL_BIN=$VERCEL_DIR/node_modules/.bin/vercel" >> "$GITHUB_ENV"
      - name: Pull Vercel environment information
        shell: bash --noprofile --norc -euo pipefail {0}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          "$VERCEL_BIN" pull --yes --environment="${{ inputs.environment }}" --token="$VERCEL_TOKEN"
      - name: Deploy to Vercel
        id: deploy
        shell: bash --noprofile --norc -euo pipefail {0}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # `vercel deploy` prints the bare deployment URL to stdout and the
          # human-readable "Preview:"/"Inspect:" lines to stderr. Capture all of
          # it (tee back to the log so the URLs stay visible there) and parse the
          # URLs robustly from the combined output.
          deploy_log="$(mktemp)"
          "$VERCEL_BIN" deploy --prebuilt ${{ inputs.production && '--prod' || '' }} --token="$VERCEL_TOKEN" "${{ inputs.deploy-path }}" 2>&1 | tee "$deploy_log"

          # Preview URL: prefer the "Preview: <url>" line; fall back to the last
          # bare https://*.vercel.app URL the CLI emitted (the deployment URL).
          preview_url="$(grep -oE 'Preview: https://[^[:space:]]+' "$deploy_log" | tail -n1 | sed 's/^Preview: //')"
          if [ -z "$preview_url" ]; then
            preview_url="$(grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app[^[:space:]]*' "$deploy_log" | tail -n1)"
          fi
          # Inspect (dashboard) URL, if present.
          inspect_url="$(grep -oE 'Inspect: https://[^[:space:]]+' "$deploy_log" | tail -n1 | sed 's/^Inspect: //')"

          echo "url=$preview_url" >> "$GITHUB_OUTPUT"
          echo "inspect=$inspect_url" >> "$GITHUB_OUTPUT"
          echo "Captured preview URL: ${preview_url:-<none>}"
      - name: Comment preview URL on PR
        # Only on PR events with a preview deploy — never on production/main
        # pushes. Skipped if the deploy produced no preview URL.
        if: ${{ github.event_name == 'pull_request' && !inputs.production && steps.deploy.outputs.url != '' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: webapp-preview-${{ inputs.deploy-path }}
          message: |
            🔗 Webapp preview: ${{ steps.deploy.outputs.url }}

            🔍 Inspect: ${{ steps.deploy.outputs.inspect }}
            Deployed commit: `${{ github.event.pull_request.head.sha }}`
      - name: Forward CI Status
        if: always()
        uses: rainlanguage/github-chore/.github/actions/telegram-status-report@main
        with:
          status: ${{ job.status }}
          telegram-bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
