name: Rainix CI check shell
on: [push]
jobs:
  rainix-check-shell:
    strategy:
      matrix:
        os: [ubuntu-latest,
          # apple silicon
          macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      # Substitute prebuilt rainix derivations from the shared Cachix binary
      # cache instead of rebuilding toolchain crates from source (rainix#196).
      # Pushes new paths when CACHIX_AUTH_TOKEN is set; continue-on-error so a
      # missing cache/token or a Cachix outage degrades to a normal build.
      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until the Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          # 1G = 1073741824
          gc-max-store-size-linux: 8G
      - run: NIXPKGS_ALLOW_INSECURE=1 nix flake check --impure
      - run: nix develop --command cargo release --version
      - run: nix develop --command flamegraph --help
      - run: nix develop --command graph --version
      - run: nix develop --command goldsky --version
      - run: nix develop --command yq --version
      - run: nix develop --command gh --version
      - run: nix develop --command default-shell-test
      - run: nix develop .#sol-shell --command nix run .#sol-shell-test
      - run: nix develop .#rust-shell --command nix run .#rust-shell-test
