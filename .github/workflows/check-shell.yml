name: Rainix CI check shell
on: [push]
jobs:
  rainix-check-shell:
    strategy:
      matrix:
        os: [ubuntu-latest,
          # apple silicon
          macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      # Shared nix + cachix CI preamble (checkout, nix-quick-install, Cachix,
      # cache-nix-action) — pinned action SHAs live in the composite. This is a
      # local workflow (not a reusable), so a `./` ref would also work, but the
      # fully qualified ref keeps every call site consistent.
      - uses: rainlanguage/rainix/.github/actions/nix-cachix-setup@main
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: NIXPKGS_ALLOW_INSECURE=1 nix flake check --impure
      - run: nix develop --command cargo release --version
      - run: nix develop --command flamegraph --help
      - run: nix develop --command graph --version
      - run: nix develop --command goldsky --version
      - run: nix develop --command yq --version
      - run: nix develop --command gh --version
      - run: nix develop --command default-shell-test
      - run: nix develop .#sol-shell --command nix run .#sol-shell-test
      - run: nix develop .#rust-shell --command nix run .#rust-shell-test
