name: rainix-sol-static
on:
  workflow_call:
env:
  RAINIX_SHA: 307bf27fcc5a410994f5a6a6a96527a64625c3da
jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      # Shared nix + cachix CI preamble (checkout, nix-quick-install, Cachix,
      # cache-nix-action) — pinned action SHAs live in the composite. Fully
      # qualified ref: a bare `./` would resolve against the calling repo.
      - uses: rainlanguage/rainix/.github/actions/nix-cachix-setup@main
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # Ignored tests are banned org-wide with no exceptions: Rust #[ignore],
      # JS .skip/.only, Solidity xtest renames and any vm.skip. A test either
      # runs and passes or is deleted.
      - uses: rainlanguage/rainix/.github/actions/no-ignored-tests@main
      # Custom NatSpec tags (@custom:) are banned org-wide — document behavior
      # in standard NatSpec. Sole exception: ERC-7201's normative
      # `@custom:storage-location erc7201:` annotation, which tooling reads.
      - uses: rainlanguage/rainix/.github/actions/no-custom-natspec@main
      # Cache Foundry's incremental compilation cache + artifacts so unchanged
      # contracts aren't recompiled (forge build is the dominant CI cost).
      - name: Cache Foundry build
        uses: rainlanguage/rainix/.github/actions/cache@main
        with:
          path: |
            cache
            out
          key: foundry-full-${{ runner.os }}-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'script/**/*.sol', 'foundry.toml', 'soldeer.lock', 'remappings.txt') }}
          restore-keys: |
            foundry-full-${{ runner.os }}-
      - name: Install soldeer dependencies
        if: hashFiles('soldeer.lock') != ''
        run: nix develop github:rainlanguage/rainix/${{ env.RAINIX_SHA }}#sol-shell -c forge soldeer install
      - run: nix develop github:rainlanguage/rainix/${{ env.RAINIX_SHA }}#sol-shell -c slither .
      - run: nix develop github:rainlanguage/rainix/${{ env.RAINIX_SHA }}#sol-shell -c forge fmt --check
      # Enforce Rain's one-contract-per-.sol-file convention (rainix#214).
      - run: nix develop github:rainlanguage/rainix/${{ env.RAINIX_SHA }}#sol-shell -c rainix-sol-single-contract
