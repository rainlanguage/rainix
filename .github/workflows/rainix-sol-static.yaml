name: rainix-sol-static
on:
  workflow_call:
jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      # Substitute prebuilt rainix derivations from the shared Cachix binary
      # cache instead of rebuilding toolchain crates from source (rainix#196).
      # Pushes new paths when CACHIX_AUTH_TOKEN is set; continue-on-error so a
      # missing cache/token or a Cachix outage degrades to a normal build.
      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # No store-watching daemon: it checkpoints the nix DB
          # concurrently with cache-nix-action and corrupts it ("database
          # disk image is malformed"). Push happens once in the post step.
          useDaemon: false
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
      # Cache Foundry's incremental compilation cache + artifacts so unchanged
      # contracts aren't recompiled (forge build is the dominant CI cost).
      - name: Cache Foundry build
        uses: actions/cache@v4
        with:
          path: |
            cache
            out
          key: foundry-full-${{ runner.os }}-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'script/**/*.sol', 'foundry.toml', 'soldeer.lock', 'remappings.txt') }}
          restore-keys: |
            foundry-full-${{ runner.os }}-
      - name: Install soldeer dependencies
        if: hashFiles('soldeer.lock') != ''
        run: nix develop github:rainlanguage/rainix#sol-shell -c forge soldeer install
      - run: nix develop github:rainlanguage/rainix#sol-shell -c slither .
      - run: nix develop github:rainlanguage/rainix#sol-shell -c forge fmt --check
