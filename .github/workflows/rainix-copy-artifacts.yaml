name: rainix-copy-artifacts
on:
  workflow_call:
jobs:
  copy-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      # Substitute prebuilt derivations from the shared Cachix cache so the
      # toolchain + any prelude build don't refetch crates from crates.io (whose
      # download endpoint 403s nix's User-Agent). Pushes new paths when
      # CACHIX_AUTH_TOKEN is set; continue-on-error degrades gracefully.
      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # No store-watching daemon: it checkpoints the nix DB concurrently
          # with cache-nix-action and corrupts it. Push happens in the post step.
          useDaemon: false
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
      # No Foundry build cache here on purpose: this is a clean-build determinism
      # check, so out/ must be regenerated fresh — and caching only cache/ (not
      # out/) gives no real speedup, since forge recompiles to rebuild the
      # missing out/ artifacts anyway. The cache+out workflows (sol-test etc.)
      # keep the cache; copy-artifacts skips the save/restore overhead.
      - name: Install soldeer dependencies
        if: hashFiles('soldeer.lock') != ''
        run: nix develop github:rainlanguage/rainix#sol-shell -c forge soldeer install
      # Currency-check every committed generated artifact by re-running each
      # consumer-provided codegen step. The final git diff fails if any
      # committed file has drifted from its source. The build-meta.sh hook is
      # consumer-supplied because rain meta build's invocation (input/output
      # filenames, meta type) varies per repo.
      - name: Regenerate meta artifacts
        if: hashFiles('script/build-meta.sh') != ''
        run: nix develop github:rainlanguage/rainix#sol-shell -c ./script/build-meta.sh
      - name: Regenerate pointer artifacts
        if: hashFiles('script/BuildPointers.sol') != ''
        run: nix develop github:rainlanguage/rainix#sol-shell -c forge script ./script/BuildPointers.sol
      - name: Build Solidity
        run: nix develop github:rainlanguage/rainix#sol-shell -c forge build
      - name: Copy forge artifacts into committed location
        if: hashFiles('script/CopyArtifacts.sol') != ''
        run: nix develop github:rainlanguage/rainix#sol-shell -c forge script ./script/CopyArtifacts.sol --ffi
      - name: Regenerate subgraph artifacts
        if: hashFiles('script/build-subgraph.sh') != ''
        run: nix develop github:rainlanguage/rainix#subgraph-shell -c ./script/build-subgraph.sh
      - name: Format (so generated artifacts match committed style)
        run: nix develop github:rainlanguage/rainix#sol-shell -c forge fmt
      - name: Assert committed artifacts match freshly built
        run: |
          if ! git diff --exit-code; then
            echo "::error::Committed meta/pointer/abi/subgraph artifacts are stale. Regenerate (script/build-meta.sh, script/BuildPointers.sol, script/CopyArtifacts.sol, script/build-subgraph.sh, forge fmt) and commit."
            exit 1
          fi
