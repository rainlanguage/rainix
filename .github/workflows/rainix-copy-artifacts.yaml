name: rainix-copy-artifacts
on:
  workflow_call:
env:
  RAINIX_SHA: 53e96a7d0a97d7c7c75c3b2412521324776fdac6
jobs:
  copy-artifacts:
    runs-on: ubuntu-latest
    steps:
      # Shared nix + cachix CI preamble (checkout, nix-quick-install, Cachix,
      # cache-nix-action) — pinned action SHAs live in the composite. Fully
      # qualified ref: a bare `./` would resolve against the calling repo.
      - uses: rainlanguage/rainix/.github/actions/nix-cachix-setup@main
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # No Foundry build cache here on purpose: this is a clean-build determinism
      # check, so out/ must be regenerated fresh — and caching only cache/ (not
      # out/) gives no real speedup, since forge recompiles to rebuild the
      # missing out/ artifacts anyway. The cache+out workflows (sol-test etc.)
      # keep the cache; copy-artifacts skips the save/restore overhead.
      - name: Install soldeer dependencies
        if: hashFiles('soldeer.lock') != ''
        run: nix develop github:rainlanguage/rainix/${{ env.RAINIX_SHA }}#sol-shell -c forge soldeer install
      # Currency-check every committed generated artifact by re-running each
      # consumer-provided codegen step. The final git diff fails if any
      # committed file has drifted from its source. The build-meta.sh hook is
      # consumer-supplied because rain meta build's invocation (input/output
      # filenames, meta type) varies per repo.
      - name: Regenerate meta artifacts
        if: hashFiles('script/build-meta.sh') != ''
        run: nix develop github:rainlanguage/rainix/${{ env.RAINIX_SHA }}#sol-shell -c ./script/build-meta.sh
      # A repo that commits generated sources but exposes no regen step passes
      # every check below without anything being regenerated, which is
      # indistinguishable from a real pass. Fail loudly instead.
      - name: Assert committed generated sources have a regen step
        run: |
          if [ -d src/generated ] \
            && [ ! -f script/Build.sol ] \
            && [ ! -f script/BuildPointers.sol ] \
            && [ ! -f script/build.sh ]; then
            echo "::error::src/generated/ is committed but no regen step was found (script/Build.sol, script/BuildPointers.sol or script/build.sh), so the currency check below would pass without regenerating anything."
            exit 1
          fi
      # The codegen script is consumer named: `script/Build.sol` is the
      # convention, `script/BuildPointers.sol` the legacy name. Both are matched
      # because a repo that renames its script must not silently stop being
      # regenerated, and so must not be forced to rename in lockstep with this
      # workflow, which consumers track at @main.
      - name: Regenerate generated sources
        if: hashFiles('script/Build.sol', 'script/BuildPointers.sol') != ''
        run: |
          for candidate in script/Build.sol script/BuildPointers.sol; do
            if [ -f "$candidate" ]; then
              nix develop github:rainlanguage/rainix/${{ env.RAINIX_SHA }}#sol-shell -c forge script "./$candidate"
              break
            fi
          done
      - name: Build Solidity
        run: nix develop github:rainlanguage/rainix/${{ env.RAINIX_SHA }}#sol-shell -c forge build
      - name: Copy forge artifacts into committed location
        if: hashFiles('script/CopyArtifacts.sol') != ''
        run: nix develop github:rainlanguage/rainix/${{ env.RAINIX_SHA }}#sol-shell -c forge script ./script/CopyArtifacts.sol --ffi
      # Catch-all post-forge regen hook: consumer-supplied. Runs outside any
      # nix devshell so the script picks shells per command (subgraph-shell,
      # sol-shell, etc.) for whatever derived artifacts it emits.
      - name: Regenerate derived artifacts
        if: hashFiles('script/build.sh') != ''
        run: ./script/build.sh
      - name: Format (so generated artifacts match committed style)
        run: nix develop github:rainlanguage/rainix/${{ env.RAINIX_SHA }}#sol-shell -c forge fmt
      - name: Assert committed artifacts match freshly built
        run: |
          if ! git diff --exit-code; then
            echo "::error::Committed artifacts are stale. Regenerate (script/build-meta.sh, your codegen script, script/CopyArtifacts.sol, script/build.sh, forge fmt) and commit."
            exit 1
          fi
