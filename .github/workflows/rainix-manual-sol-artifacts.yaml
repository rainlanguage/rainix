name: rainix-manual-sol-artifacts
on:
  workflow_call:
    inputs:
      suite:
        type: string
        required: true
        description: |
          Passed through as `DEPLOYMENT_SUITE`. `script/Deploy.sol` dispatches
          on this to select what to deploy.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: nixbuild/nix-quick-install-action@5bb6a3b3abe66fd09bbf250dce8ada94f856a703 # v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      # Substitute prebuilt rainix derivations from the shared Cachix binary
      # cache instead of rebuilding toolchain crates from source (rainix#196).
      # Pushes new paths when CACHIX_AUTH_TOKEN is set; continue-on-error so a
      # missing cache/token or a Cachix outage degrades to a normal build.
      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # No store-watching daemon: it checkpoints the nix DB
          # concurrently with cache-nix-action and corrupts it ("database
          # disk image is malformed"). Push happens once in the post step.
          useDaemon: false
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
      # Cache Foundry's incremental compilation cache + artifacts so unchanged
      # contracts aren't recompiled (forge build is the dominant CI cost).
      - name: Cache Foundry build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            cache
            out
          key: foundry-full-${{ runner.os }}-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'script/**/*.sol', 'foundry.toml', 'soldeer.lock', 'remappings.txt') }}
          restore-keys: |
            foundry-full-${{ runner.os }}-
      - name: Install soldeer dependencies
        if: hashFiles('soldeer.lock') != ''
        run: nix develop github:rainlanguage/rainix#sol-shell -c forge soldeer install
      - run: nix develop github:rainlanguage/rainix#sol-shell -c forge selectors up --all
      - run: nix develop github:rainlanguage/rainix#sol-shell -c forge script script/Deploy.sol:Deploy -vvvvv --slow --broadcast --verify
        env:
          DEPLOYMENT_SUITE: ${{ inputs.suite }}
          DEPLOYMENT_KEY: ${{ secrets.PRIVATE_KEY }}
          ARBITRUM_RPC_URL: ${{ secrets.RPC_URL_ARBITRUM_FORK || vars.RPC_URL_ARBITRUM_FORK || '' }}
          BASE_RPC_URL: ${{ secrets.RPC_URL_BASE_FORK || vars.RPC_URL_BASE_FORK || '' }}
          BASE_SEPOLIA_RPC_URL: ${{ secrets.RPC_URL_BASE_SEPOLIA_FORK || vars.RPC_URL_BASE_SEPOLIA_FORK || '' }}
          FLARE_RPC_URL: ${{ secrets.RPC_URL_FLARE_FORK || vars.RPC_URL_FLARE_FORK || '' }}
          POLYGON_RPC_URL: ${{ secrets.RPC_URL_POLYGON_FORK || vars.RPC_URL_POLYGON_FORK || '' }}
          # Etherscan V2 is a single multichain API key: source all Etherscan-family
          # networks from the one EXPLORER_VERIFICATION_KEY secret (legacy per-chain
          # secret kept as fallback during migration). Flare/Songbird are NOT
          # Etherscan (Routescan/Blockscout) so keep a chain-specific key.
          CI_DEPLOY_ARBITRUM_ETHERSCAN_API_KEY: ${{ secrets.EXPLORER_VERIFICATION_KEY || secrets.CI_DEPLOY_ARBITRUM_ETHERSCAN_API_KEY || vars.CI_DEPLOY_ARBITRUM_ETHERSCAN_API_KEY || '' }}
          CI_DEPLOY_BASE_ETHERSCAN_API_KEY: ${{ secrets.EXPLORER_VERIFICATION_KEY || secrets.CI_DEPLOY_BASE_ETHERSCAN_API_KEY || vars.CI_DEPLOY_BASE_ETHERSCAN_API_KEY || '' }}
          CI_DEPLOY_BASE_SEPOLIA_ETHERSCAN_API_KEY: ${{ secrets.EXPLORER_VERIFICATION_KEY || secrets.CI_DEPLOY_BASE_SEPOLIA_ETHERSCAN_API_KEY || vars.CI_DEPLOY_BASE_SEPOLIA_ETHERSCAN_API_KEY || '' }}
          CI_DEPLOY_POLYGON_ETHERSCAN_API_KEY: ${{ secrets.EXPLORER_VERIFICATION_KEY || secrets.CI_DEPLOY_POLYGON_ETHERSCAN_API_KEY || vars.CI_DEPLOY_POLYGON_ETHERSCAN_API_KEY || '' }}
          CI_DEPLOY_FLARE_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_FLARE_ETHERSCAN_API_KEY || vars.CI_DEPLOY_FLARE_ETHERSCAN_API_KEY || '' }}
