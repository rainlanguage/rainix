name: rainix-rs-static
on:
  workflow_call:
env:
  RAINIX_SHA: 307bf27fcc5a410994f5a6a6a96527a64625c3da
jobs:
  rs-static:
    runs-on: ubuntu-latest
    steps:
      # Shared nix + cachix CI preamble (checkout, nix-quick-install, Cachix,
      # cache-nix-action). The pinned action SHAs live in the composite. A
      # reusable workflow must reference a sibling local action by its fully
      # qualified owner/repo path (a bare `./` would resolve against the calling
      # repo, not rainix), mirroring the github-chore action ref below.
      - uses: rainlanguage/rainix/.github/actions/nix-cachix-setup@main
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - uses: rainlanguage/rainix/.github/actions/rust-cache@main
      - run: nix develop github:rainlanguage/rainix/${{ env.RAINIX_SHA }}#rust-shell -c rainix-rs-static
      # Run the rainix pre-commit hook bundle (taplo, the nix hooks, yamlfmt,
      # shellcheck, rustfmt) over all files — the same hooks a local commit
      # runs. rainix-rs-static only covers rustfmt + clippy, so a file that is
      # hook-dirty but rustfmt-clean (e.g. a non-canonical Cargo.toml) used to
      # pass PR CI and only blow up later in the autopublish bump commit. Folded
      # in as a step (not a separate job) to reuse this job's warm Nix store
      # rather than re-paying runner setup. Reuses rust-shell, so prettier-rainix
      # (which needs the default shell's RAINIX_PRETTIER_BUNDLE_DIR) no-ops here;
      # frontend repos format svelte/ts via their own pipeline.
      - run: nix develop github:rainlanguage/rainix/${{ env.RAINIX_SHA }}#rust-shell -c pre-commit run --all-files --show-diff-on-failure --color always
