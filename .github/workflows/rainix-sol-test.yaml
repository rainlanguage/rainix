name: rainix-sol-test
on:
  workflow_call:
    secrets:
      PRIVATE_KEY:
        required: false
      EXPLORER_VERIFICATION_KEY:
        required: false
      CI_DEPLOY_SEPOLIA_RPC_URL:
        required: false
      RPC_URL_ARBITRUM_FORK:
        required: false
      RPC_URL_BASE_FORK:
        required: false
      RPC_URL_BASE_SEPOLIA_FORK:
        required: false
      RPC_URL_FLARE_FORK:
        required: false
      RPC_URL_POLYGON_FORK:
        required: false
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DEPLOYMENT_KEY: ${{ secrets.PRIVATE_KEY }}
      ETH_RPC_URL: ${{ secrets.CI_DEPLOY_SEPOLIA_RPC_URL || vars.CI_DEPLOY_SEPOLIA_RPC_URL }}
      ETHERSCAN_API_KEY: ${{ secrets.EXPLORER_VERIFICATION_KEY }}
      CI_DEPLOY_SEPOLIA_RPC_URL: ${{ secrets.CI_DEPLOY_SEPOLIA_RPC_URL || vars.CI_DEPLOY_SEPOLIA_RPC_URL }}
      CI_FORK_SEPOLIA_BLOCK_NUMBER: ${{ vars.CI_FORK_SEPOLIA_BLOCK_NUMBER }}
      CI_FORK_SEPOLIA_DEPLOYER_ADDRESS: ${{ vars.CI_FORK_SEPOLIA_DEPLOYER_ADDRESS }}
      ARBITRUM_RPC_URL: ${{ secrets.RPC_URL_ARBITRUM_FORK || vars.RPC_URL_ARBITRUM_FORK }}
      BASE_RPC_URL: ${{ secrets.RPC_URL_BASE_FORK || vars.RPC_URL_BASE_FORK }}
      BASE_SEPOLIA_RPC_URL: ${{ secrets.RPC_URL_BASE_SEPOLIA_FORK || vars.RPC_URL_BASE_SEPOLIA_FORK }}
      FLARE_RPC_URL: ${{ secrets.RPC_URL_FLARE_FORK || vars.RPC_URL_FLARE_FORK }}
      POLYGON_RPC_URL: ${{ secrets.RPC_URL_POLYGON_FORK || vars.RPC_URL_POLYGON_FORK }}
    steps:
      - uses: actions/checkout@v6
      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      # Substitute prebuilt rainix derivations from the shared Cachix binary
      # cache instead of rebuilding toolchain crates from source (rainix#196).
      # Pushes new paths when CACHIX_AUTH_TOKEN is set; continue-on-error so a
      # missing cache/token or a Cachix outage degrades to a normal build.
      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # No store-watching daemon: it checkpoints the nix DB
          # concurrently with cache-nix-action and corrupts it ("database
          # disk image is malformed"). Push happens once in the post step.
          useDaemon: false
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
      # Cache Foundry's incremental compilation cache + artifacts so unchanged
      # contracts aren't recompiled (forge build is the dominant CI cost).
      - name: Cache Foundry build
        uses: actions/cache@v4
        with:
          path: |
            cache
            out
          key: foundry-${{ runner.os }}-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'script/**/*.sol', 'foundry.toml', 'soldeer.lock', 'remappings.txt') }}
          restore-keys: |
            foundry-${{ runner.os }}-
      - name: Install soldeer dependencies
        if: hashFiles('soldeer.lock') != ''
        run: nix develop github:rainlanguage/rainix#sol-shell -c forge soldeer install
      - run: nix develop github:rainlanguage/rainix#sol-shell -c forge test -vvv
