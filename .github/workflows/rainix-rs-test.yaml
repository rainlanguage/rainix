name: rainix-rs-test
on:
  workflow_call:
jobs:
  rs-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      # Shared nix + cachix CI preamble (checkout, nix-quick-install, Cachix,
      # cache-nix-action) — pinned action SHAs live in the composite. Fully
      # qualified ref: a bare `./` would resolve against the calling repo.
      # This matrix runs on macOS too, so cap the macOS store before save.
      - uses: rainlanguage/rainix/.github/actions/nix-cachix-setup@main
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          gc-max-store-size-macos: 1G
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: nix develop github:rainlanguage/rainix#rust-shell -c cargo test
