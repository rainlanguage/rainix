name: rainix-autopublish
on:
  workflow_call:
    inputs:
      crate:
        description: single cargo package name to publish. Back-compat alias for a one-element `crates`.
        required: false
        type: string
        default: ''
      crates:
        description: >-
          Space-separated cargo package names in DEPENDENCY ORDER (dependencies first), e.g. "wasm-bindgen-utils-macros wasm-bindgen-utils". Used as the publish order and the set of crates the change-gate inspects. For a single crate this is just one name (or use `crate`). The workspace releases as a unit: if ANY listed crate's content changed, all are bumped in one `cargo release` commit and published in order — one commit, one push, no chained-job conflicts.
        required: false
        type: string
        default: ''
      level:
        description: cargo-release level for the bump (default patch).
        required: false
        type: string
        default: patch
      npm-package:
        description: optional npm package name (e.g. @rainlanguage/float). When set, the workflow also detects/bumps/publishes an npm package alongside the crate(s).
        required: false
        type: string
        default: ''
      soldeer-package:
        description: optional Soldeer registry package name (e.g. rain-erc). When set, the workflow content-gates the Soldeer package (dry-run zip vs the latest published revision) and AUTO-BUMPS foundry.toml [package].version on a content change, then publishes — same merge-driven model as the crates (no manual version bump needed).
        required: false
        type: string
        default: ''
    secrets:
      PUBLISH_PRIVATE_KEY:
        required: false
      CI_GIT_EMAIL:
        required: false
      CI_GIT_USER:
        required: false
      CARGO_REGISTRY_TOKEN:
        required: false
      NPM_PUBLISH_PRIVATE_TOKEN:
        required: false
      SOLDEER_API_TOKEN:
        required: false
jobs:
  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'Package Release') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      # This job needs a deploy-key (ssh-key) checkout, so it runs the shared
      # `checkout` composite itself with the key, then calls the nix+cachix
      # preamble with `checkout: 'false'`. The pinned checkout / cache-nix /
      # nix-quick-install / Cachix SHAs all live once in the composites. Fully
      # qualified ref: a bare `./` would resolve against the calling repo.
      - uses: rainlanguage/rainix/.github/actions/checkout@main
        with:
          # PUBLISH_PRIVATE_KEY is a deploy key whose push events trigger
          # downstream workflows (unlike GITHUB_TOKEN pushes which don't).
          # If the consumer hasn't set it, ssh-key is empty and checkout
          # falls back to GITHUB_TOKEN over HTTPS — pushes still succeed,
          # they just won't trigger tag-listening workflows.
          ssh-key: ${{ secrets.PUBLISH_PRIVATE_KEY }}
      - uses: rainlanguage/rainix/.github/actions/nix-cachix-setup@main
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          checkout: 'false'
      # Resolve the crate list once (crates, else the back-compat singular crate).
      - name: Resolve crates
        run: |
          CRATES="${{ inputs.crates != '' && inputs.crates || inputs.crate }}"
          # A crate is required only when nothing else is being published; npm-
          # and soldeer-only callers legitimately have no crate.
          if [ -z "$CRATES" ] && [ -z "${{ inputs.npm-package }}" ] && [ -z "${{ inputs.soldeer-package }}" ]; then
            echo "set inputs.crate/crates, or inputs.npm-package, or inputs.soldeer-package" >&2
            exit 1
          fi
          echo "CRATES=$CRATES" >> "$GITHUB_ENV"
      - name: Git config
        run: |
          git config --global user.email "${{ secrets.CI_GIT_EMAIL || 'github-actions[bot]@users.noreply.github.com' }}"
          git config --global user.name "${{ secrets.CI_GIT_USER || 'github-actions[bot]' }}"
          # Entering the rainix devShell writes a generated .pre-commit-config.yaml
          # into the tree. cargo-release refuses to run with any uncommitted change
          # (including untracked files), so hide it from git via the local exclude
          # — repo-agnostic, no consumer needs to remember to .gitignore it.
          echo ".pre-commit-config.yaml" >> .git/info/exclude
      # Cargo change gate. Compare the *normalized content* of each packaged
      # crate against its published release — never raw file lists or tarball
      # hashes (the published .crate prefixes paths with "<name>-<version>/" and
      # adds generated files, so a naive comparison never matches and the crate
      # re-bumps every run). Strip the version prefix, drop generated/volatile
      # files, blank the version line, hash the sorted (path, content) stream.
      # crates.io 403s default curl UAs, so send a descriptive User-Agent and
      # distinguish a real 404 (never published) from other errors. The
      # workspace releases as a unit: changed=true if ANY listed crate differs.
      - name: Cargo hashes
        id: cargo
        if: ${{ inputs.crates != '' || inputs.crate != '' }}
        run: |
          set -euo pipefail
          UA="rainix-autopublish (+https://github.com/rainlanguage/rainix)"

          norm_hash() {
            local f="$1" d root
            d=$(mktemp -d)
            tar -xzf "$f" -C "$d"
            root=$(find "$d" -mindepth 1 -maxdepth 1 -type d)
            rm -f "$root/.cargo_vcs_info.json" "$root/Cargo.toml.orig" "$root/Cargo.lock"
            sed -i -E 's/^version = .*/version = "0.0.0"/' "$root/Cargo.toml"
            ( cd "$root" && find . -type f | LC_ALL=C sort \
                | while IFS= read -r p; do printf '%s\0' "$p"; cat "$p"; done \
                | sha256sum | cut -d' ' -f1 )
            rm -rf "$d"
          }

          changed=false
          for CRATE in $CRATES; do
            # cargo package resolves deps against the registry. For a first
            # interdependent workspace publish, a dependent (e.g. a lib that
            # pins its sibling proc-macro at the new version) can't be packaged
            # until that sibling is published — chicken-and-egg. If packaging
            # fails, treat the crate as changed and let the dependency-ordered
            # publish step sort it out (the sibling publishes first).
            if ! nix develop github:rainlanguage/rainix/307bf27fcc5a410994f5a6a6a96527a64625c3da#rust-shell -c cargo package -p "$CRATE" --allow-dirty --no-verify --quiet; then
              echo "gate $CRATE: cannot package yet (likely an unpublished intra-workspace dep) -> changed"
              changed=true
              continue
            fi
            LOCAL_CRATE=$(ls -t target/package/"$CRATE"-*.crate | head -1)
            NEW=$(norm_hash "$LOCAL_CRATE")
            resp=$(curl -sS -H "User-Agent: $UA" -w $'\n%{http_code}' "https://crates.io/api/v1/crates/$CRATE")
            http=$(printf '%s' "$resp" | tail -n1)
            body=$(printf '%s' "$resp" | sed '$d')
            if [ "$http" = "404" ]; then
              OLD="none"
            elif [ "$http" = "200" ]; then
              OLD_VERSION=$(printf '%s' "$body" | python3 -c "import sys, json; print(json.load(sys.stdin)['crate']['max_version'])")
              curl -fsSL -H "User-Agent: $UA" "https://crates.io/api/v1/crates/$CRATE/$OLD_VERSION/download" -o /tmp/old.crate
              OLD=$(norm_hash /tmp/old.crate)
            else
              echo "crates.io API returned HTTP $http for $CRATE" >&2
              exit 1
            fi
            echo "gate $CRATE: OLD=$OLD NEW=$NEW"
            if [ "$OLD" != "$NEW" ]; then changed=true; fi
          done
          echo "changed=$changed" >> $GITHUB_OUTPUT
      # Detect npm changes.
      - name: NPM hashes
        if: ${{ inputs.npm-package != '' }}
        id: npm
        run: |
          nix develop github:rainlanguage/rainix/307bf27fcc5a410994f5a6a6a96527a64625c3da#rust-node-shell -c bash -c '
            OLD=$(npm view ${{ inputs.npm-package }}@latest dist.shasum 2>/dev/null || echo "none")
            NEW=$(npm pack --silent | xargs shasum | cut -c1-40)
            rm -f *.tgz
            echo "old=$OLD" >> $GITHUB_OUTPUT
            echo "new=$NEW" >> $GITHUB_OUTPUT
            if [ "$OLD" = "$NEW" ]; then echo "changed=false" >> $GITHUB_OUTPUT; else echo "changed=true" >> $GITHUB_OUTPUT; fi
          '
      # Soldeer content gate + auto-bump. Mirror the cargo gate: compare the
      # NORMALIZED content of what `forge soldeer push --dry-run` would upload
      # against the latest published revision's zip (the registry returns a
      # download URL). foundry.toml's version line is blanked in the hash so a
      # version bump alone is never seen as a content change (no infinite
      # re-bump). On a content change the next step bumps foundry.toml
      # [package].version (patch on the greater of local/registry, kept
      # monotonic) so Soldeer publishes on merge like the crates — no manual
      # version bump. The hash helper also strips pinned
      # `*_DEPLOYED_{ADDRESS,CODEHASH}_<x>_<y>_<z>` deploy-constant blocks from
      # .sol files before hashing: a repo that records a published version's
      # deployed addresses back into its own source (e.g. raindex's
      # LibRaindexDeploy) would otherwise self-trigger an endless
      # bump -> pin-constants -> bump loop, since pinning the constants is itself
      # a source change. The un-versioned current constants (no _x_y_z suffix)
      # are kept, so real bytecode changes still register.
      # The hash helper is base64'd to avoid YAML heredoc fragility.
      - name: Soldeer content gate
        if: ${{ inputs.soldeer-package != '' }}
        id: soldeer
        run: |
          set -euo pipefail
          PKG="${{ inputs.soldeer-package }}"
          echo '' | base64 -d > /tmp/soldeer_normhash.py
          nh() { python3 /tmp/soldeer_normhash.py "$1"; }
          META=$(curl -fsSL "https://api.soldeer.xyz/api/v1/revision?project_name=$PKG&offset=0&limit=1" || echo '{}')
          REMOTE=$(printf '%s' "$META" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['version'] if d.get('data') else 'none')")
          URL=$(printf '%s' "$META" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['url'] if d.get('data') else '')")
          LOCAL=$(awk -F\" '/^version[[:space:]]*=/ { print $2; exit }' foundry.toml)
          # Local package content: dry-run writes <cwd-basename>.zip into the cwd.
          rm -f ./*.zip
          nix develop github:rainlanguage/rainix/307bf27fcc5a410994f5a6a6a96527a64625c3da#sol-shell -c forge soldeer push "$PKG~$LOCAL" --dry-run
          NEW=$(nh "$(ls -t ./*.zip | head -1)"); rm -f ./*.zip
          if [ -z "$URL" ] || [ "$REMOTE" = "none" ]; then OLD="none"; else
            curl -fsSL "$URL" -o /tmp/soldeer_pub.zip; OLD=$(nh /tmp/soldeer_pub.zip); fi
          echo "soldeer gate: remote=$REMOTE local=$LOCAL OLD=$OLD NEW=$NEW"
          # Next version: a first publish (never on the registry) uses LOCAL
          # as-is; otherwise patch-bump the GREATER of local/remote so NEXT is
          # always > LOCAL — foundry.toml left ahead of the registry by a prior
          # bumped-but-unpublished run must not yield a no-op bump.
          if [ "$REMOTE" = "none" ]; then
            NEXT="$LOCAL"
          else
            NEXT=$(python3 -c "t=lambda v:[int(x) for x in (v.split('.')+['0','0','0'])[:3]]; b=max(t('$LOCAL'),t('$REMOTE')); b[2]+=1; print('.'.join(map(str,b)))")
          fi
          if [ "$OLD" != "$NEW" ]; then echo "changed=true" >> "$GITHUB_OUTPUT"; else echo "changed=false" >> "$GITHUB_OUTPUT"; fi
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"
      # Run the test suite only when something is actually going to publish. The
      # change gates above are cheap (cargo package --no-verify + a hash compare,
      # an npm/soldeer version lookup); the full workspace test is the expensive
      # step. Gating it here means a no-op push to main (CI/doc changes, an empty
      # re-trigger commit, an unchanged crate) short-circuits without paying for
      # it. PR CI already tested the code before merge; this is the pre-publish
      # gate on the exact merged commit.
      - name: Cargo test
        if: ${{ (inputs.crates != '' || inputs.crate != '') && (steps.cargo.outputs.changed == 'true' || steps.npm.outputs.changed == 'true' || steps.soldeer.outputs.changed == 'true') }}
        run: nix develop github:rainlanguage/rainix/307bf27fcc5a410994f5a6a6a96527a64625c3da#rust-shell -c cargo test --workspace
      # Bump versions. One cargo-release invocation bumps every listed crate and
      # rewrites their inter-crate version pins atomically in one commit.
      #
      # The bump commit is then amended to start with "Package Release" so the
      # job-level `if: !startsWith(..., 'Package Release')` guard skips the run
      # this push triggers. Otherwise cargo-release's default message
      # ("chore: Release") re-triggers the workflow, and concurrent re-runs race
      # on the same version bump (tag collisions). NPM bumps already commit a
      # "Package Release npm-…" message, so only the cargo bump needs this.
      - name: Bump Cargo version
        if: ${{ steps.cargo.outputs.changed == 'true' }}
        run: |
          set -euo pipefail
          PKGS=""
          for CRATE in $CRATES; do PKGS="$PKGS -p $CRATE"; done
          nix develop github:rainlanguage/rainix/307bf27fcc5a410994f5a6a6a96527a64625c3da#rust-shell -c cargo release --no-confirm --execute --no-tag --no-push --no-publish $PKGS ${{ inputs.level }}
          git commit --amend -m "Package Release: cargo version bump ($CRATES)"
      - name: Bump NPM version
        if: ${{ inputs.npm-package != '' && steps.npm.outputs.changed == 'true' }}
        run: |
          NEW=$(nix develop github:rainlanguage/rainix/307bf27fcc5a410994f5a6a6a96527a64625c3da#rust-node-shell -c npm version patch --no-git-tag-version)
          echo "NPM_VERSION=$NEW" >> $GITHUB_ENV
          git add package.json package-lock.json
          git commit -m "Package Release npm-${NEW}"
      # Auto-bump the Soldeer package version when its content changed, so it
      # publishes on merge like the crates. The "Package Release" prefix makes
      # the job-level skip guard ignore the push this commit triggers.
      - name: Bump Soldeer version
        if: ${{ inputs.soldeer-package != '' && steps.soldeer.outputs.changed == 'true' }}
        run: |
          set -euo pipefail
          NEXT="${{ steps.soldeer.outputs.next }}"
          sed -i -E "0,/^version[[:space:]]*=.*/s//version = \"$NEXT\"/" foundry.toml
          git add foundry.toml
          # A first publish (NEXT == the current foundry.toml version) stages
          # nothing — only commit when the version actually changed, so the bump
          # step never fails with "nothing to commit". --no-verify: an automated
          # version bump must not be gated on the repo's pre-commit hooks.
          if git diff --cached --quiet; then
            echo "foundry.toml already at $NEXT; nothing to commit"
          else
            git commit --no-verify -m "Package Release: soldeer ${{ inputs.soldeer-package }} $NEXT"
          fi
      # Tag + push everything in one shot. cargo tags are namespaced
      # <crate>-v<version>; rebase onto any concurrent push first (only the
      # shared Cargo.lock is expected to conflict).
      - name: Tag and push
        if: ${{ steps.cargo.outputs.changed == 'true' || steps.npm.outputs.changed == 'true' || steps.soldeer.outputs.changed == 'true' }}
        run: |
          set -euo pipefail
          git fetch origin
          if ! git rebase "origin/${{ github.ref_name }}"; then
            nix develop github:rainlanguage/rainix/307bf27fcc5a410994f5a6a6a96527a64625c3da#rust-shell -c cargo generate-lockfile
            git add Cargo.lock
            GIT_EDITOR=true git rebase --continue
          fi
          if [ "${{ steps.cargo.outputs.changed }}" = "true" ]; then
            for CRATE in $CRATES; do
              VER=$(nix develop github:rainlanguage/rainix/307bf27fcc5a410994f5a6a6a96527a64625c3da#rust-shell -c cargo pkgid -p "$CRATE" | cut -d@ -f2)
              git tag "$CRATE-v$VER"
            done
          fi
          if [ -n "${{ env.NPM_VERSION }}" ]; then git tag npm-${{ env.NPM_VERSION }}; fi
          if [ "${{ steps.soldeer.outputs.changed }}" = "true" ]; then git tag sol-v${{ steps.soldeer.outputs.next }}; fi
          git push origin HEAD
          git push origin --tags
      # Package npm tarball for upload step.
      - name: NPM pack
        if: ${{ inputs.npm-package != '' && steps.npm.outputs.changed == 'true' }}
        run: |
          TARBALL=$(nix develop github:rainlanguage/rainix/307bf27fcc5a410994f5a6a6a96527a64625c3da#rust-node-shell -c npm pack --silent)
          mv "$TARBALL" npm_package_${{ env.NPM_VERSION }}.tgz
      # Publishes. Crates publish in dependency order so each crate's deps are
      # already on the registry when it publishes.
      - name: Publish to crates.io
        if: ${{ steps.cargo.outputs.changed == 'true' }}
        run: |
          set -euo pipefail
          for CRATE in $CRATES; do
            nix develop github:rainlanguage/rainix/307bf27fcc5a410994f5a6a6a96527a64625c3da#rust-shell -c cargo publish -p "$CRATE"
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish to NPM
        if: ${{ inputs.npm-package != '' && steps.npm.outputs.changed == 'true' }}
        uses: JS-DevTools/npm-publish@19c28f1ef146469e409470805ea4279d47c3d35c # v3
        with:
          token: ${{ secrets.NPM_PUBLISH_PRIVATE_TOKEN }}
          access: public
          package: npm_package_${{ env.NPM_VERSION }}.tgz
      - name: Publish to Soldeer
        if: ${{ inputs.soldeer-package != '' && steps.soldeer.outputs.changed == 'true' }}
        env:
          SOLDEER_API_TOKEN: ${{ secrets.SOLDEER_API_TOKEN }}
        run: nix develop github:rainlanguage/rainix/307bf27fcc5a410994f5a6a6a96527a64625c3da#sol-shell -c forge soldeer push "${{ inputs.soldeer-package }}~${{ steps.soldeer.outputs.next }}"
      # GitHub Releases. One per crate (loop), plus npm/soldeer.
      - name: GitHub Release (cargo)
        if: ${{ steps.cargo.outputs.changed == 'true' }}
        run: |
          set -euo pipefail
          for CRATE in $CRATES; do
            VER=$(nix develop github:rainlanguage/rainix/307bf27fcc5a410994f5a6a6a96527a64625c3da#rust-shell -c cargo pkgid -p "$CRATE" | cut -d@ -f2)
            gh release create "$CRATE-v$VER" --title "$CRATE-v$VER" --notes "Automated release of $CRATE $VER." || true
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: GitHub Release (npm)
        if: ${{ inputs.npm-package != '' && steps.npm.outputs.changed == 'true' }}
        uses: rainlanguage/rainix/.github/actions/gh-release@main
        with:
          tag-name: npm-${{ env.NPM_VERSION }}
          name: NPM Package Release ${{ env.NPM_VERSION }}
          files: npm_package_${{ env.NPM_VERSION }}.tgz
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: GitHub Release (soldeer)
        if: ${{ inputs.soldeer-package != '' && steps.soldeer.outputs.changed == 'true' }}
        uses: rainlanguage/rainix/.github/actions/gh-release@main
        with:
          tag-name: sol-v${{ steps.soldeer.outputs.next }}
          name: Soldeer Release sol-v${{ steps.soldeer.outputs.next }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
