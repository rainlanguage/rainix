name: Rainix CI
on: [push]
jobs:
  rainix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        task: ["cargo test", "cargo build --release"]
        include:
          # Solidity doesn't need to be tested on multiple platforms.
          - os: ubuntu-latest
            task: forge test -vvv
          - os: ubuntu-latest
            task: slither .
          - os: ubuntu-latest
            task: forge fmt --check
          - os: ubuntu-latest
            task: reuse lint
          - os: ubuntu-latest
            task: rainix-sol-artifacts
          # We don't need to do rust static analysis on multiple platforms.
          - os: ubuntu-latest
            task: rainix-rs-static
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      DEPLOYMENT_KEY: ${{ secrets.PRIVATE_KEY }}
    defaults:
      run:
        working-directory: test/fixture
    steps:
      # Bootstrap checkout. This is a LOCAL self-test workflow that exercises the
      # composites living in THIS repo, so the steps below reference them by `./`
      # path (which pins them to THIS commit — what the branch actually changed —
      # instead of `rainlanguage/rainix/...@main`, which resolves against the tip
      # of main and on a bootstrap PR is the pre-change / missing version: the
      # original cause of the red self-test). A `./` action only resolves after
      # the repo is on disk, so this checkout runs first and can't itself be the
      # `./` composite (chicken-and-egg). It pins the SAME `actions/checkout` SHA
      # the `checkout` composite wraps (.github/actions/checkout/action.yml);
      # keep the two in lockstep. The composite remains the single source for
      # every non-bootstrap checkout (reusables + downstream consumers).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # Shared nix + cachix CI preamble (nix-quick-install, Cachix,
      # cache-nix-action) — pinned third-party SHAs live once in the composite.
      # `checkout: 'false'`: the bootstrap above already checked out, and the
      # composite's own internal checkout ref stays a fully qualified
      # `rainlanguage/rainix/...@main` (a `./` inside a composite resolves
      # against the CALLER repo, breaking downstream consumers) which can't
      # resolve on this branch until the composite lands on main.
      - uses: ./.github/actions/nix-cachix-setup
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          checkout: 'false'
      # Cache Foundry's incremental compilation cache + artifacts so unchanged
      # contracts aren't recompiled (forge build is the dominant CI cost).
      - name: Cache Foundry build
        uses: ./.github/actions/cache
        with:
          path: |
            cache
            out
          key: foundry-full-${{ runner.os }}-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'script/**/*.sol', 'foundry.toml', 'soldeer.lock', 'remappings.txt') }}
          restore-keys: |
            foundry-full-${{ runner.os }}-
      - run: nix develop ../.. --command forge soldeer install
      - name: Run ${{ matrix.task }}
        env:
          ETH_RPC_URL: ${{ secrets.CI_DEPLOY_SEPOLIA_RPC_URL || vars.CI_DEPLOY_SEPOLIA_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.EXPLORER_VERIFICATION_KEY }}
        run: nix develop ../.. --command ${{ matrix.task }}
