name: Rainix CI
on: [push]
jobs:
  rainix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        task: ["cargo test", "cargo build --release"]
        include:
          # Solidity doesn't need to be tested on multiple platforms.
          - os: ubuntu-latest
            task: forge test -vvv
          - os: ubuntu-latest
            task: slither .
          - os: ubuntu-latest
            task: forge fmt --check
          - os: ubuntu-latest
            task: reuse lint
          - os: ubuntu-latest
            task: rainix-sol-artifacts
          # We don't need to do rust static analysis on multiple platforms.
          - os: ubuntu-latest
            task: rainix-rs-static
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      DEPLOYMENT_KEY: ${{ secrets.PRIVATE_KEY }}
    defaults:
      run:
        working-directory: test/fixture
    steps:
      # Shared nix + cachix CI preamble (checkout, nix-quick-install, Cachix,
      # cache-nix-action). The pinned third-party action SHAs live ONCE in the
      # composites; every call site — this self-test included — references them
      # fully qualified at `rainlanguage/rainix/...@main`, exactly as downstream
      # consumers do, so the self-test covers what consumers actually run and no
      # third-party SHA is duplicated.
      #
      # BOOTSTRAP CAVEAT: the PR that first adds these composites is RED here
      # until it merges. `@main` resolves against the tip of main, which does
      # not yet contain `.github/actions/*`, so "Prepare all required actions"
      # fails. This cannot be worked around on-branch without a regression:
      #   - `./` would resolve a composite's *internal* refs against the
      #     consumer repo, breaking every downstream caller;
      #   - a branch pin (`@<branch>`) dangles the instant the branch is deleted
      #     post-merge;
      #   - GitHub downloads every transitively-referenced action up front, so
      #     even `checkout: 'false'` cannot dodge the preamble's internal
      #     `checkout@main` download.
      # Once this PR lands on main the `@main` actions exist and every job here
      # is green — zero version skew, each third-party action still single-
      # sourced. See the PR thread for the full analysis.
      - uses: rainlanguage/rainix/.github/actions/nix-cachix-setup@main
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # Cache Foundry's incremental compilation cache + artifacts so unchanged
      # contracts aren't recompiled (forge build is the dominant CI cost).
      - name: Cache Foundry build
        uses: rainlanguage/rainix/.github/actions/cache@main
        with:
          path: |
            cache
            out
          key: foundry-full-${{ runner.os }}-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'script/**/*.sol', 'foundry.toml', 'soldeer.lock', 'remappings.txt') }}
          restore-keys: |
            foundry-full-${{ runner.os }}-
      - run: nix develop ../.. --command forge soldeer install
      - name: Run ${{ matrix.task }}
        env:
          ETH_RPC_URL: ${{ secrets.CI_DEPLOY_SEPOLIA_RPC_URL || vars.CI_DEPLOY_SEPOLIA_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.EXPLORER_VERIFICATION_KEY }}
        run: nix develop ../.. --command ${{ matrix.task }}
