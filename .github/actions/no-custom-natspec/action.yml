name: no-custom-natspec
description: >-
  Fails on any @custom: NatSpec tag in first-party Solidity. Custom tags are an unreviewed side-channel convention (e.g. @custom:error duplicating declaration-site error docs); document behavior in standard NatSpec (@notice/@dev/@param/@return) instead. The single exception is ERC-7201's normative, tooling-read storage annotation, which must match its exact form: `@custom:storage-location erc7201:`.
runs:
  using: composite
  steps:
    - name: Check for custom NatSpec tags
      shell: bash
      run: |
        set -euo pipefail
        # Single source of truth: the BATS-covered library in rainix's lib/.
        # shellcheck disable=SC1091
        source "$GITHUB_ACTION_PATH/../../../lib/no-custom-natspec.sh"
        check_no_custom_natspec .
