specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Counter
    network: mainnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: Counter
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - SetNumber
      abis:
        - name: Counter
          file: ../out/Counter.sol/Counter.json
      eventHandlers:
        - event: SetNumber(indexed uint256)
          handler: handleSetNumber
      file: ./src/mapping.ts
